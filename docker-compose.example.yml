services:
  db:
    image: postgres:16
    container_name: bartend_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bartend}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-bartending_app}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bartend} -d ${POSTGRES_DB:-bartending_app}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/superdingo101/bartender-app-server:latest}
    container_name: bartend_backend
    command: sh -c "npx prisma migrate deploy && npm start"
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-bartend}:${POSTGRES_PASSWORD:-secret}@db:5432/${POSTGRES_DB:-bartending_app}
      NODE_ENV: production
      PORT: 5000
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/superdingo101/bartender-app-client:latest}
    container_name: bartend_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    env_file:
      - .env-frontend
    environment:
      # Leave blank for same-origin production. The frontend nginx container
      # proxies /api/*, /health, and /socket.io/* to the backend service.
      # Set to a public HTTPS origin only when the API is hosted elsewhere.
      REACT_APP_API_URL: "${REACT_APP_API_URL:-}"
    restart: unless-stopped

volumes:
  db_data:
    driver: local
