
services:
  db:
    image: postgres:16
    container_name: bartend_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bartend}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-bartending_app}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bartend -d bartending_app"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: bartend_backend
    command: sh -c "npx prisma migrate dev --name init && npm run dev"
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://bartend:secret@db:5432/bartending_app}
      NODE_ENV: development
      PORT: 5000
    volumes:
      - ./server:/app
      - /app/node_modules
    restart: unless-stopped
    stdin_open: true
    tty: true

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: bartend_frontend
    command: npm start
    ports:
      - "3109:3000"
    depends_on:
      - backend
    env_file:
      - .env-frontend
    environment:
      REACT_APP_API_URL: http://192.168.0.236:5000
      CHOKIDAR_USEPOLLING: true
      WDS_SOCKET_PORT: 0
    volumes:
      - ./client:/app
      - /app/node_modules
    stdin_open: true
    tty: true
    restart: unless-stopped

volumes:
  db_data:
    driver: local