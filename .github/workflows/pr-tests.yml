name: PR Tests

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  server-tests:
    name: Server tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bartender_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d bartender_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bartender_test
      JWT_SECRET: test-secret
      NODE_ENV: test
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Apply database migrations
        run: npx prisma migrate deploy
      - name: Create CI seed host
        run: npm run test:create-seed-host
      - name: Seed test database
        run: DEMO_EVENT_HOST_EMAIL=ci-admin@example.com npm run prisma:seed
      - name: Run server tests
        run: npm test -- --runInBand

  client-tests:
    name: Client tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run client tests
        run: CI=true npm test -- --watchAll=false
